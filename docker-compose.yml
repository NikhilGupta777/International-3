services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NODE_ENV: production
      DATABASE_URL: postgresql://ytgrabber:ytgrabber@db:5432/ytgrabber
      SESSION_SECRET: ${SESSION_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_API_KEY_2: ${GEMINI_API_KEY_2:-}
      GEMINI_API_KEY_3: ${GEMINI_API_KEY_3:-}
      GEMINI_API_KEY_4: ${GEMINI_API_KEY_4:-}
      BHAGWAT_PASSWORD: ${BHAGWAT_PASSWORD}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_OBJECT_PREFIX: ${S3_OBJECT_PREFIX:-ytgrabber}
      S3_SIGNED_URL_TTL_SEC: ${S3_SIGNED_URL_TTL_SEC:-7200}
      # YouTube bot-detection bypass options (AWS/datacenter IPs can be blocked by YouTube)
      # OPTION 1 (easiest): Export cookies from a YouTube-logged-in Chrome browser using the
      # "Get cookies.txt LOCALLY" extension, then base64-encode: base64 -w 0 cookies.txt
      # Paste the result here. No file upload needed, just set and restart.
      YTDLP_COOKIES_BASE64: ${YTDLP_COOKIES_BASE64:-}
      # OPTION 2: Route yt-dlp through a residential/non-datacenter proxy
      # e.g. YTDLP_PROXY=socks5://user:pass@host:port
      YTDLP_PROXY: ${YTDLP_PROXY:-}
      # OPTION 3: Static YouTube po_token + visitor_data (last resort; usually video-bound)
      YTDLP_PO_TOKEN: ${YTDLP_PO_TOKEN:-}
      YTDLP_VISITOR_DATA: ${YTDLP_VISITOR_DATA:-}
      # OPTION 4 (recommended on AWS): bgutil dynamic PO-token provider sidecar
      YTDLP_POT_PROVIDER_URL: ${YTDLP_POT_PROVIDER_URL:-http://bgutil-provider:4416}
      MAX_CONCURRENT_CLIP_JOBS: ${MAX_CONCURRENT_CLIP_JOBS:-3}
      MAX_CONCURRENT_SUBTITLE_JOBS: ${MAX_CONCURRENT_SUBTITLE_JOBS:-3}
      MAX_SUBTITLE_QUEUE_SIZE: ${MAX_SUBTITLE_QUEUE_SIZE:-40}
      RATE_LIMIT_BYPASS_IPS: ${RATE_LIMIT_BYPASS_IPS:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:ops@videomaking.in}
    depends_on:
      db:
        condition: service_healthy
      bgutil-provider:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 2m

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    init: true
    expose:
      - "4416"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ytgrabber
      POSTGRES_USER: ytgrabber
      POSTGRES_PASSWORD: ytgrabber
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytgrabber"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
