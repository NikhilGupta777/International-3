kind = "api"
  previewPath = "/api" # TODO - should be excluded from preview in the first place
  title = "API Server"
  version = "1.0.0"
  id = "3B4_FFSkEVBkAeYMFRJ2e"
  deploymentTarget = "autoscale"

  [[services]]
  localPort = 8080
  name = "API Server"
  paths = ["/api"]

  [services.development]
  run = "pnpm --filter @workspace/api-server run dev"

  [services.development.env]
  SERVE_STATIC = "true"
  # Mirror production S3 layout locally so the same code path (S3 cookie
  # loader, S3 storage helpers) is exercised in dev. AWS credentials come
  # from Replit Secrets — do NOT add them here.
  S3_BUCKET = "malikaeditorr"
  S3_REGION = "us-east-1"
  S3_OBJECT_PREFIX = "ytgrabber-green"
  YTDLP_COOKIES_S3_KEY = "ytgrabber-green/secrets/ytdlp-cookies-base64.txt"
  # Use the standalone yt-dlp binary (no python yt_dlp module on Replit Nix
  # Python). Mirrors Lambda Docker which sets the same env to /usr/local/bin/yt-dlp.
  YTDLP_BIN = "/home/runner/workspace/.local/bin/yt-dlp"

  [services.production]

  [services.production.build]
  args = ["sh", "-c", "pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"]

  [services.production.build.env]
  NODE_ENV = "production"
  UV_PROJECT_ENVIRONMENT = "/home/runner/workspace/.pythonlibs"
  UV_PYTHON_PREFERENCE = "only-system"
  UV_PYTHON_DOWNLOADS = "never"

  [services.production.run]
  # we don't run through pnpm to make startup faster in production
  args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

  [services.production.run.env]
  PORT = "8080"
  NODE_ENV = "production"

  [services.production.health.startup]
  path = "/api/healthz"
  