name: Emergency API HTTP Image

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "596596146505"
  ECR_API_HTTP_REPO: ytgrabber-green-api-http
  YTDLP_VERSION: 2026.03.17

jobs:
  build:
    name: Build API HTTP Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3

      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server run build

      - name: Ensure ECR repo exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_API_HTTP_REPO" --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_API_HTTP_REPO" --image-scanning-configuration scanOnPush=true --region "$AWS_REGION" >/dev/null

      - name: Build and push API HTTP image
        id: push
        run: |
          TAG="${GITHUB_SHA::8}"
          URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_API_HTTP_REPO}:${TAG}"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false --sbom=false \
            --build-arg YTDLP_VERSION="${YTDLP_VERSION}" \
            -f Dockerfile.api-http \
            -t "$URI" \
            --push .
          echo "image_uri=${URI}" >> "$GITHUB_OUTPUT"
          echo "API HTTP image: ${URI}"
