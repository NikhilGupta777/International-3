name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rebuild_translator:
        description: "Rebuild the translator image"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      download_models_at_build:
        description: "Bake CosyVoice/LatentSync model weights into translator image"
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      rebuild_gpu_ami:
        description: "Rebuild custom GPU AMI with pre-pulled translator image (runs after translator build)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel a running deploy mid-flight

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "596596146505"
  ECR_API_REPO: ytgrabber-green-api-lambda
  ECR_WORKER_REPO: ytgrabber-green-worker
  ECR_TRANSLATOR_REPO: ytgrabber-green-translator
  ECR_TRANSLATOR_CPU_REPO: ytgrabber-green-translator-cpu
  ECR_TRANSLATOR_BASE_REPO: ytgrabber-green-translator-base
  CF_STACK_PREFIX: ytgrabber-green
  YTDLP_VERSION: "2026.03.17"
  SITE_DOMAIN_NAME: videomaking.in
  CLOUDFRONT_CERTIFICATE_ARN: arn:aws:acm:us-east-1:596596146505:certificate/62ff8b55-8a4b-4634-97e8-75924181c9f5

jobs:
  detect-translator-changes:
    name: Detect Translator Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Detect translator image inputs
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=${{ github.event.inputs.rebuild_translator }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi

          if git diff --name-only "$BEFORE" "$GITHUB_SHA" | grep -E '^artifacts/video-translator-service/(Dockerfile|Dockerfile\.base|requirements\.txt|constraints\.txt|worker\.py|runtime_deps\.py)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Job 1: Build & push API Lambda image ────────────────────────────────────
  build-api:
    name: Build API Lambda Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0   # no submodules needed for API build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::596596146505:role/ytgrabber-green-gha-deployer
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # Add buildx for layer caching support on API job (Issue 6)
      - uses: docker/setup-buildx-action@v3

      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server run build

      - name: Build & push API Lambda image
        id: push
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="HEAD~1"
            fi
            if ! git diff --name-only "$BEFORE" "$GITHUB_SHA" | grep -E '^(artifacts/api-server/|Dockerfile\.api-lambda|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml)'; then
              EXISTING_URI=$(aws cloudformation describe-stacks \
                --stack-name "${{ env.CF_STACK_PREFIX }}-serverless" \
                --region "${{ env.AWS_REGION }}" \
                --query "Stacks[0].Parameters[?ParameterKey=='ImageUri'].ParameterValue | [0]" \
                --output text)
              if [ -z "$EXISTING_URI" ] || [ "$EXISTING_URI" = "None" ]; then
                echo "Could not resolve existing API image URI"
                exit 1
              fi
              echo "No API image inputs changed; reusing ${EXISTING_URI}"
              echo "image_uri=${EXISTING_URI}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          TAG="${GITHUB_SHA::8}"
          URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_API_REPO }}:${TAG}"
          # Pass pinned yt-dlp version so Dockerfile layer cache is stable
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -f Dockerfile.api-lambda \
            --build-arg YTDLP_VERSION=${{ env.YTDLP_VERSION }} \
            --cache-from type=gha,scope=api-image \
            --cache-to type=gha,mode=max,scope=api-image \
            -t "$URI" \
            --push \
            .

          DIGEST=$(aws ecr batch-get-image \
            --region "${{ env.AWS_REGION }}" \
            --repository-name "${{ env.ECR_API_REPO }}" \
            --image-ids "imageTag=${TAG}" \
            --accepted-media-types "application/vnd.docker.distribution.manifest.v2+json" "application/vnd.oci.image.manifest.v1+json" \
            --query "images[0].imageId.imageDigest" \
            --output text)
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "Lambda-compatible manifest was not published for $URI"
            exit 1
          fi

          echo "image_uri=${URI}" >> "$GITHUB_OUTPUT"
          echo "✅ API image: ${URI} (${DIGEST})"

  # ─── Job 2: Build & push Fargate worker image ────────────────────────────────
  build-worker:
    name: Build Fargate Worker Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
      batch_job_def: ${{ steps.register.outputs.batch_job_def }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::596596146505:role/ytgrabber-green-gha-deployer
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3

      # Pre-build api-server's dist on the runner (NOT inside Docker —
      # bundling esbuild across the workspace graph is fiddly to do in a
      # filter-installed container). The dist tree is then included in the
      # Docker build context so the queue worker can dynImport
      # `@workspace/api-server/dist/routes/video-editor.mjs` at runtime to
      # execute editor-render jobs. Mirrors the build-api job above.
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server run build

      - name: Build & push worker image
        id: push
        run: |
          TAG="${GITHUB_SHA::8}"
          URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_WORKER_REPO }}:${TAG}"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -f artifacts/queue-worker/Dockerfile \
            -t "$URI" \
            --cache-from type=gha,scope=worker-image \
            --cache-to type=gha,mode=max,scope=worker-image \
            --push .
          echo "image_uri=${URI}" >> "$GITHUB_OUTPUT"
          echo "✅ Worker image: ${URI}"

      - name: Register new Batch job definition
        id: register
        run: |
          WORKER_URI="${{ steps.push.outputs.image_uri }}"

          # Get current active job definition
          CURRENT=$(aws batch describe-job-definitions \
            --job-definition-name ${{ env.CF_STACK_PREFIX }}-worker-job \
            --status ACTIVE \
            --query 'sort_by(jobDefinitions, &revision)[-1]' \
            --output json)

          # Use del() to strip ONLY the read-only fields; preserves everything
          # else including platformCapabilities:["FARGATE"], propagateTags, etc.
          NEW_JSON=$(echo "$CURRENT" | jq \
            --arg img "$WORKER_URI" \
            'del(.jobDefinitionArn, .revision, .status, .jobDefinitionName, .containerOrchestrationType) |
             .containerProperties.image = $img |
             .timeout = {"attemptDurationSeconds": 2700} |
             .containerProperties.environment = (
               (.containerProperties.environment // [])
               | map(select(
                   .name != "SUBTITLES_YTDLP_COMMAND_TIMEOUT_MS" and
                   .name != "SUBTITLES_YTDLP_PROBE_TIMEOUT_MS" and
                   .name != "SUBTITLES_MAX_YTDLP_ATTEMPTS"
                 ))
               + [
                 {"name":"SUBTITLES_YTDLP_COMMAND_TIMEOUT_MS","value":"600000"},
                 {"name":"SUBTITLES_YTDLP_PROBE_TIMEOUT_MS","value":"45000"},
                 {"name":"SUBTITLES_MAX_YTDLP_ATTEMPTS","value":"5"}
               ]
             )')
          # Register it
          RESULT=$(aws batch register-job-definition \
            --job-definition-name ${{ env.CF_STACK_PREFIX }}-worker-job \
            --cli-input-json "$NEW_JSON")

          REV=$(echo "$RESULT" | jq -r '.revision')
          DEF="${{ env.CF_STACK_PREFIX }}-worker-job:${REV}"
          echo "batch_job_def=${DEF}" >> "$GITHUB_OUTPUT"
          echo "✅ Batch job def: ${DEF}"

  # ─── Job 3: Build & push Translator Fargate image ─────────────────────────────
  # IMPORTANT: The translator image (~20 GB) is SKIPPED on every code push.
  # It must be triggered manually via workflow_dispatch or when the Dockerfile
  # or requirements.txt actually changes. This prevents 60-minute builds on
  # every commit. The deployed image tag is stored in ECR and re-used.
  # To rebuild manually: Actions → Deploy to Production → Run workflow → check "rebuild_translator"
  # ─── Job 3: Build translator images (base + slim) ────────────────────────────
  # SPLIT IMAGE STRATEGY — two Dockerfiles, two images:
  #
  #   Dockerfile.base  (~20 GB): CUDA + all model weights + Python deps
  #     Rebuilt ONLY when Dockerfile.base / requirements.txt / constraints.txt /
  #     runtime_deps.py change.  Typical: once per few weeks.  Time: ~20-25 min.
  #
  #   Dockerfile (slim, ~50 MB): FROM translator-base + COPY worker.py + validation
  #     Rebuilt on EVERY push that touches any translator file.  Time: ~2-3 min.
  #     Includes pyflakes + py_compile — broken code FAILS THE BUILD here.
  #
  # Result: worker.py fixes deploy in 2-3 min instead of 25 min.
  build-translator:
    name: Build Translator Image
    runs-on: ubuntu-latest
    needs: [detect-translator-changes]
    if: ${{ needs.detect-translator-changes.outputs.changed == 'true' }}
    outputs:
      image_uri:    ${{ steps.slim_push.outputs.image_uri }}
      batch_job_def: ${{ steps.register.outputs.batch_job_def }}
      base_changed: ${{ steps.detect_base.outputs.base_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::596596146505:role/ytgrabber-green-gha-deployer
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3

      # ── Step 1: Detect if base image needs rebuilding ──────────────────────
      - name: Detect base image changes
        id: detect_base
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.rebuild_translator }}" = "true" ]; then
            echo "base_changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual rebuild — treating base as changed"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          if git diff --name-only "$BEFORE" "$GITHUB_SHA" | \
             grep -E '^artifacts/video-translator-service/(Dockerfile\.base|requirements\.txt|constraints\.txt|runtime_deps\.py)$'; then
            echo "base_changed=true" >> "$GITHUB_OUTPUT"
            echo "Base dependencies changed — will rebuild base image (~20 min)"
          else
            echo "base_changed=false" >> "$GITHUB_OUTPUT"
            echo "Base unchanged — will reuse existing base image, build slim only (~2-3 min)"
          fi

      # ── Step 2a: Free runner disk before any translator image build ───────
      - name: Free disk space for translator build
        run: |
          df -h
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            /opt/hostedtoolcache \
            /usr/local/.ghcup \
            /usr/share/swift \
            /usr/local/share/powershell \
            /opt/az \
            /opt/microsoft \
            "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes || true
          docker buildx prune -af || true
          df -h

      - name: Ensure base ECR repo exists
        if: steps.detect_base.outputs.base_changed == 'true'
        run: |
          aws ecr describe-repositories --repository-names "${{ env.ECR_TRANSLATOR_BASE_REPO }}" \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || \
          aws ecr create-repository --repository-name "${{ env.ECR_TRANSLATOR_BASE_REPO }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Build & push base image
        id: base_push
        if: steps.detect_base.outputs.base_changed == 'true'
        run: |
          TAG="${GITHUB_SHA::8}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DOWNLOAD_MODELS="${{ github.event.inputs.download_models_at_build || 'true' }}"
          else
            DOWNLOAD_MODELS="true"
          fi
          BASE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_TRANSLATOR_BASE_REPO }}:${TAG}"

          # Write AWS creds to temp files for BuildKit --mount=type=secret
          echo -n "$AWS_ACCESS_KEY_ID" > /tmp/aws_access_key_id
          echo -n "$AWS_SECRET_ACCESS_KEY" > /tmp/aws_secret_access_key
          echo -n "$AWS_SESSION_TOKEN" > /tmp/aws_session_token
          echo -n "${{ env.AWS_REGION }}" > /tmp/aws_region

          BUILDKIT_PROGRESS=plain docker buildx build \
            --platform linux/amd64 \
            --provenance=false --sbom=false \
            -f artifacts/video-translator-service/Dockerfile.base \
            --build-arg DOWNLOAD_MODELS_AT_BUILD="$DOWNLOAD_MODELS" \
            --build-arg RUN_MODEL_SMOKE_TEST="false" \
            --secret id=aws_access_key_id,src=/tmp/aws_access_key_id \
            --secret id=aws_secret_access_key,src=/tmp/aws_secret_access_key \
            --secret id=aws_session_token,src=/tmp/aws_session_token \
            --secret id=aws_region,src=/tmp/aws_region \
            -t "$BASE_URI" \
            --push artifacts/video-translator-service/

          rm -f /tmp/aws_access_key_id /tmp/aws_secret_access_key /tmp/aws_session_token /tmp/aws_region
          echo "base_uri=${BASE_URI}" >> "$GITHUB_OUTPUT"
          echo "Base image pushed: ${BASE_URI}"

      # ── Step 2b: Resolve existing base image (when base unchanged) ─────────
      - name: Resolve existing base image from ECR
        id: base_resolve
        if: steps.detect_base.outputs.base_changed != 'true'
        run: |
          # Find the most recently pushed base image tag
          TAG=$(aws ecr describe-images \
            --repository-name "${{ env.ECR_TRANSLATOR_BASE_REPO }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
            --output text 2>/dev/null || echo "")
          if [ -z "$TAG" ] || [ "$TAG" = "None" ]; then
            echo "::error::No base image found in ECR. Run with rebuild_translator=true to build the base image first."
            exit 1
          fi
          BASE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_TRANSLATOR_BASE_REPO }}:${TAG}"
          echo "base_uri=${BASE_URI}" >> "$GITHUB_OUTPUT"
          echo "Reusing existing base image: ${BASE_URI}"

      # Step 3: Push slim translator image without unpacking the huge base.
      # GitHub-hosted runners cannot reliably unpack the 20 GB GPU base image.
      # Validate worker.py, create a tiny /app code layer, and append it to the
      # remote base image with crane so only the code layer is uploaded.
      - name: Build & push slim translator image
        id: slim_push
        run: |
          TAG="${GITHUB_SHA::8}"
          BASE_IMAGE="${{ steps.base_push.outputs.base_uri || steps.base_resolve.outputs.base_uri }}"
          SLIM_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_TRANSLATOR_REPO }}:${TAG}"

          python -m py_compile artifacts/video-translator-service/worker.py
          python -m pip install --quiet pyflakes
          pyflakes artifacts/video-translator-service/worker.py

          CRANE_VERSION="v0.21.5"
          curl -fsSL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            -o /tmp/go-containerregistry.tar.gz
          sudo tar -xzf /tmp/go-containerregistry.tar.gz -C /usr/local/bin crane
          crane version

          REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          crane auth login -u AWS -p "$(aws ecr get-login-password --region "${{ env.AWS_REGION }}")" "$REGISTRY"

          LAYER_ROOT="$(mktemp -d)"
          mkdir -p "$LAYER_ROOT/app"
          cp artifacts/video-translator-service/worker.py "$LAYER_ROOT/app/worker.py"
          cp artifacts/video-translator-service/runtime_deps.py "$LAYER_ROOT/app/runtime_deps.py"
          tar --numeric-owner --owner=0 --group=0 -C "$LAYER_ROOT" -cf /tmp/translator-code-layer.tar app

          crane mutate "$BASE_IMAGE" \
            --append /tmp/translator-code-layer.tar \
            --entrypoint /usr/bin/env \
            --cmd python --cmd -u --cmd worker.py \
            --env NVIDIA_DISABLE_REQUIRE=1 \
            --workdir /app \
            --set-platform linux/amd64 \
            --tag "$SLIM_URI"

          echo "image_uri=${SLIM_URI}" >> "$GITHUB_OUTPUT"
          echo "Slim translator image pushed: ${SLIM_URI}"

      # ── Step 4: Register Batch job definition ──────────────────────────────
      - name: Register new Batch job definition
        id: register
        run: |
          TRANSLATOR_URI="${{ steps.slim_push.outputs.image_uri }}"

          CURRENT=$(aws batch describe-job-definitions \
            --job-definition-name ${{ env.CF_STACK_PREFIX }}-translator-job \
            --status ACTIVE \
            --query 'sort_by(jobDefinitions, &revision)[-1]' \
            --output json)

          NEW_JSON=$(echo "$CURRENT" | jq \
            --arg img "$TRANSLATOR_URI" \
            'del(.jobDefinitionArn, .revision, .status, .jobDefinitionName, .containerOrchestrationType) |
             .containerProperties.image = $img |
             .containerProperties.command = ["python", "-u", "worker.py"] |
             .timeout = {"attemptDurationSeconds": 10800} |
             (.containerProperties.resourceRequirements[] | select(.type == "MEMORY").value) = "15000" |
             (.containerProperties.resourceRequirements[] | select(.type == "GPU").value) = "1"')

          RESULT=$(aws batch register-job-definition \
            --job-definition-name ${{ env.CF_STACK_PREFIX }}-translator-job \
            --cli-input-json "$NEW_JSON")

          REV=$(echo "$RESULT" | jq -r '.revision')
          DEF="${{ env.CF_STACK_PREFIX }}-translator-job:${REV}"
          echo "batch_job_def=${DEF}" >> "$GITHUB_OUTPUT"
          echo "Translator Batch job def: ${DEF}"

  # ─── Job to resolve the current translator image tag (when not rebuilt) ──────
  # When build-translator is skipped, we look up the most recent ECR image tag
  # and use that for the Batch job definition, avoiding "job not found" errors.
  resolve-translator:
    name: Resolve Translator Image
    runs-on: ubuntu-latest
    needs: [detect-translator-changes]
    if: ${{ needs.detect-translator-changes.outputs.changed != 'true' }}
    outputs:
      batch_job_def: ${{ steps.resolve.outputs.batch_job_def }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::596596146505:role/ytgrabber-green-gha-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve current active translator Batch job definition
        id: resolve
        run: |
          DEF=$(aws batch describe-job-definitions \
            --job-definition-name ${{ env.CF_STACK_PREFIX }}-translator-job \
            --status ACTIVE \
            --query 'sort_by(jobDefinitions, &revision)[-1].jobDefinitionName' \
            --output text 2>/dev/null || echo "")
          REV=$(aws batch describe-job-definitions \
            --job-definition-name ${{ env.CF_STACK_PREFIX }}-translator-job \
            --status ACTIVE \
            --query 'sort_by(jobDefinitions, &revision)[-1].revision' \
            --output text 2>/dev/null || echo "1")
          FULL="${DEF}:${REV}"
          if [ -z "$DEF" ] || [ "$DEF" = "None" ] || [ -z "$REV" ] || [ "$REV" = "None" ]; then
            echo "No active translator job definition found"
            exit 1
          fi
          echo "batch_job_def=${FULL}" >> "$GITHUB_OUTPUT"
          echo "ℹ️ Reusing existing translator job def: ${FULL}"

  # ─── Job 3b: Build CPU translator image (Neural Voice / no-GPU path) ──────────
  # Lightweight ~500 MB image: Python + edge-tts + ffmpeg — no CUDA, no CosyVoice.
  # Runs on Fargate, starts in ~30 sec, 10× cheaper than GPU.
  # Triggers: whenever Dockerfile.cpu, requirements.cpu.txt, or worker.py changes.
  build-translator-cpu:
    name: Build CPU Translator Image
    runs-on: ubuntu-latest
    outputs:
      image_uri:    ${{ steps.push.outputs.image_uri }}
      batch_job_def: ${{ steps.register.outputs.batch_job_def }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::596596146505:role/ytgrabber-green-gha-deployer
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3

      - name: Build & push CPU translator image
        id: push
        run: |
          TAG="${GITHUB_SHA::8}"
          URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_TRANSLATOR_CPU_REPO }}:${TAG}"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false --sbom=false \
            -f artifacts/video-translator-service/Dockerfile.cpu \
            -t "$URI" \
            --cache-from type=gha,scope=translator-cpu-image \
            --cache-to type=gha,mode=max,scope=translator-cpu-image \
            --push artifacts/video-translator-service/
          echo "image_uri=${URI}" >> "$GITHUB_OUTPUT"
          echo "✅ CPU translator image: ${URI}"

      - name: Register CPU Batch job definition (Fargate)
        id: register
        run: |
          CPU_URI="${{ steps.push.outputs.image_uri }}"
          EXEC_ROLE="arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.CF_STACK_PREFIX }}-api-role"
          CONTAINER_JSON=$(jq -n \
            --arg img "$CPU_URI" \
            --arg role "$EXEC_ROLE" \
            '{image:$img,command:["python","worker.py"],jobRoleArn:$role,executionRoleArn:$role,
              resourceRequirements:[{type:"VCPU",value:"2"},{type:"MEMORY",value:"8192"}],
              environment:[{name:"VOICE_CLONE",value:"false"},{name:"LIP_SYNC",value:"false"},
                           {name:"ALLOW_RUNTIME_MODEL_DOWNLOADS",value:"0"}],
              networkConfiguration:{assignPublicIp:"ENABLED"}}')
          RESULT=$(aws batch register-job-definition \
            --job-definition-name "${{ env.CF_STACK_PREFIX }}-translator-cpu-job" \
            --type container \
            --platform-capabilities FARGATE \
            --container-properties "$CONTAINER_JSON")
          REV=$(echo "$RESULT" | jq -r '.revision')
          DEF="${{ env.CF_STACK_PREFIX }}-translator-cpu-job:${REV}"
          echo "batch_job_def=${DEF}" >> "$GITHUB_OUTPUT"
          echo "✅ CPU Batch job def: ${DEF}"

  # ─── Job 4: Deploy full stack ─────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [build-api, build-worker, build-translator, resolve-translator, build-translator-cpu]
    if: ${{ always() && needs.build-api.result == 'success' && needs.build-worker.result == 'success' && (needs.build-translator.result == 'success' || needs.build-translator.result == 'skipped') && (needs.build-translator.result == 'success' || needs.resolve-translator.result == 'success') && needs.build-translator-cpu.result == 'success' }}
    # No environment gate — secrets are repo-level, no approval required
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::596596146505:role/ytgrabber-green-gha-deployer
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # pnpm + node needed because deploy-serverless.ps1 runs pnpm build internally
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # Write env file and inject fresh runtime settings.
      # SECURITY: All sensitive values read from GitHub Secrets — no plaintext passwords.
      - name: Write .env.green
        env:
          ENV_GREEN_CONTENT_SECRET: ${{ secrets.ENV_GREEN_CONTENT }}
          GEMINI_API_KEY_SECRET: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2_SECRET: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3_SECRET: ${{ secrets.GEMINI_API_KEY_3 }}
          WEBSITE_AUTH_PASSWORD_SECRET: ${{ secrets.WEBSITE_AUTH_PASSWORD }}
          BHAGWAT_PASSWORD_SECRET: ${{ secrets.BHAGWAT_PASSWORD }}
          GOOGLE_CLIENT_ID_SECRET: ${{ secrets.GOOGLE_CLIENT_ID }}
          NOTEBOOKLM_AUTH_JSON_B64_SECRET: ${{ secrets.NOTEBOOKLM_AUTH_JSON_B64 }}
          GOOGLE_GENAI_USE_VERTEXAI_SECRET: ${{ secrets.GOOGLE_GENAI_USE_VERTEXAI }}
          E2B_API_KEY_SECRET: ${{ secrets.E2B_API_KEY }}
        run: |
          printf '%s' "$ENV_GREEN_CONTENT_SECRET" > /tmp/.env.green
          sed -i 's/\r$//' /tmp/.env.green
          upsert_env() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            local escaped
            escaped=$(printf '%s' "$value" | sed -e 's/[\/&|]/\\&/g')
            if grep -q "^${key}=" /tmp/.env.green; then
              sed -i "s|^${key}=.*|${key}=${escaped}|" /tmp/.env.green
            else
              printf '\n%s=%s\n' "$key" "$value" >> /tmp/.env.green
            fi
          }
          read_env() {
            local key="$1"
            grep -m1 "^${key}=" /tmp/.env.green | cut -d= -f2- | tr -d '\r' || true
          }
          upsert_env "YOUTUBE_BATCH_JOB_DEFINITION" "${{ needs.build-worker.outputs.batch_job_def }}"
          upsert_env "GEMINI_API_KEY" "$GEMINI_API_KEY_SECRET"
          upsert_env "GEMINI_API_KEY_2" "$GEMINI_API_KEY_2_SECRET"
          upsert_env "GEMINI_API_KEY_3" "$GEMINI_API_KEY_3_SECRET"
          upsert_env "E2B_API_KEY" "$E2B_API_KEY_SECRET"
          upsert_env "GOOGLE_GENAI_USE_VERTEXAI" "$GOOGLE_GENAI_USE_VERTEXAI_SECRET"
          if [[ "$GOOGLE_GENAI_USE_VERTEXAI_SECRET" =~ ^(1|true|yes|on)$ ]]; then
            upsert_env "GOOGLE_CLOUD_PROJECT" "${{ secrets.GOOGLE_CLOUD_PROJECT }}"
            upsert_env "GOOGLE_CLOUD_LOCATION" "${{ secrets.GOOGLE_CLOUD_LOCATION }}"
            # Upload Vertex credentials to S3 (too large for Lambda 4KB env limit)
            VERTEX_CREDS_B64="${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_BASE64 }}"
            if [ -n "$VERTEX_CREDS_B64" ]; then
              VERTEX_S3_BUCKET="$(read_env S3_BUCKET)"
              VERTEX_S3_REGION="$(read_env S3_REGION)"
              VERTEX_S3_PREFIX="$(read_env S3_OBJECT_PREFIX)"
              if [ -z "$VERTEX_S3_PREFIX" ]; then VERTEX_S3_PREFIX="${{ env.CF_STACK_PREFIX }}"; fi
              if [ -z "$VERTEX_S3_REGION" ]; then VERTEX_S3_REGION="${{ env.AWS_REGION }}"; fi
              VERTEX_S3_KEY="${VERTEX_S3_PREFIX%/}/secrets/vertex/service-account.json"
              printf '%s' "$VERTEX_CREDS_B64" | base64 -d > /tmp/vertex-creds.json
              aws s3 cp /tmp/vertex-creds.json "s3://${VERTEX_S3_BUCKET}/${VERTEX_S3_KEY}" --region "$VERTEX_S3_REGION" --sse AES256 --no-progress
              rm -f /tmp/vertex-creds.json
              upsert_env "GOOGLE_APPLICATION_CREDENTIALS_S3_KEY" "$VERTEX_S3_KEY"
            fi
            sed -i '/^GOOGLE_APPLICATION_CREDENTIALS_BASE64=/d' /tmp/.env.green
          else
            sed -i '/^GOOGLE_APPLICATION_CREDENTIALS_BASE64=/d' /tmp/.env.green
            sed -i '/^GOOGLE_APPLICATION_CREDENTIALS_S3_KEY=/d' /tmp/.env.green
          fi
          upsert_env "NOTEBOOKLM_ENABLED" "${{ secrets.NOTEBOOKLM_ENABLED }}"
          upsert_env "NOTEBOOKLM_NOTEBOOK_ID" "${{ secrets.NOTEBOOKLM_NOTEBOOK_ID }}"
          sed -i '/^NOTEBOOKLM_AUTH_JSON=/d' /tmp/.env.green
          if [ -n "$NOTEBOOKLM_AUTH_JSON_B64_SECRET" ]; then
            NOTEBOOKLM_AUTH_KEY="$(read_env S3_OBJECT_PREFIX)"
            if [ -z "$NOTEBOOKLM_AUTH_KEY" ]; then
              NOTEBOOKLM_AUTH_KEY="${{ env.CF_STACK_PREFIX }}"
            fi
            NOTEBOOKLM_AUTH_KEY="${NOTEBOOKLM_AUTH_KEY%/}/secrets/notebooklm/storage_state.json"
            NOTEBOOKLM_AUTH_BUCKET="$(read_env S3_BUCKET)"
            NOTEBOOKLM_AUTH_REGION="$(read_env S3_REGION)"
            if [ -z "$NOTEBOOKLM_AUTH_REGION" ]; then
              NOTEBOOKLM_AUTH_REGION="${{ env.AWS_REGION }}"
            fi
            if [ -z "$NOTEBOOKLM_AUTH_BUCKET" ]; then
              echo "::error::S3_BUCKET is required to store NotebookLM auth"
              exit 1
            fi
            printf '%s' "$NOTEBOOKLM_AUTH_JSON_B64_SECRET" | base64 -d > /tmp/notebooklm-storage-state.json
            aws s3 cp /tmp/notebooklm-storage-state.json "s3://${NOTEBOOKLM_AUTH_BUCKET}/${NOTEBOOKLM_AUTH_KEY}" --region "$NOTEBOOKLM_AUTH_REGION" --sse AES256 --no-progress
            rm -f /tmp/notebooklm-storage-state.json
            upsert_env "NOTEBOOKLM_AUTH_S3_KEY" "$NOTEBOOKLM_AUTH_KEY"
          fi
          upsert_env "WEBSITE_AUTH_PASSWORD" "$WEBSITE_AUTH_PASSWORD_SECRET"
          upsert_env "BHAGWAT_PASSWORD" "$BHAGWAT_PASSWORD_SECRET"
          upsert_env "GOOGLE_AUTH_ENABLED" "true"
          upsert_env "GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_ID_SECRET"
          upsert_env "ADMIN_PANEL_ENABLED" "true"
          upsert_env "APPROVED_ADMIN_EMAILS" "guptanikhil2056@gmail.com"
          upsert_env "ACCESS_TABLE" "${{ env.CF_STACK_PREFIX }}-access"
          upsert_env "YOUTUBE_QUEUE_PRIMARY_JOB_TYPES" "clip-cut,bhagwat-analyze,bhagwat-render,subtitles"
          upsert_env "VIDEO_EDITOR_BATCH_ENABLED" "true"
          upsert_env "VIDEO_EDITOR_BATCH_JOB_DEFINITION" "${{ needs.build-worker.outputs.batch_job_def }}"
          upsert_env "LAMBDA_CLIP_MAX_DURATION_SECONDS" "420"
          upsert_env "LAMBDA_CLIP_COMMAND_TIMEOUT_MS" "840000"
          upsert_env "LAMBDA_CLIP_STALL_TIMEOUT_MS" "180000"
          upsert_env "YTDLP_DOWNLOAD_STALL_TIMEOUT_MS" "180000"
          upsert_env "YTDLP_MAX_DOWNLOAD_ATTEMPTS" "4"
          upsert_env "MAX_CONCURRENT_CLIP_JOBS" "3"
          upsert_env "SUBTITLES_FORCE_LAMBDA" "false"
          upsert_env "SUBTITLES_LAMBDA_MAX_DURATION_SECONDS" "780"
          upsert_env "YTDLP_COOKIES_FILE" "/tmp/yt-cookies.txt"
          # Use the newly built translator job def if available, otherwise use the resolved existing one
          TRANSLATOR_JOB_DEF="${{ needs.build-translator.outputs.batch_job_def || needs.resolve-translator.outputs.batch_job_def }}"
          upsert_env "TRANSLATOR_BATCH_JOB_DEFINITION" "$TRANSLATOR_JOB_DEF"
          # Default to Spot queue (cheaper). On-Demand fast queue available as
          # TRANSLATOR_BATCH_JOB_QUEUE_FAST for urgent/admin-triggered jobs.
          upsert_env "TRANSLATOR_BATCH_JOB_QUEUE"      "${{ env.CF_STACK_PREFIX }}-gpu-queue"
          upsert_env "TRANSLATOR_BATCH_JOB_QUEUE_FAST" "${{ env.CF_STACK_PREFIX }}-gpu-fast-queue"
          upsert_env "TRANSLATOR_BATCH_TIMEOUT_SECONDS" "10800"
          upsert_env "TRANSLATOR_BATCH_FALLBACK_TIMEOUT_SECONDS" "3000"
          upsert_env "TRANSLATOR_MAX_VIDEO_SIZE_BYTES" "2147483648"
          # All models are baked into the Docker image — disable runtime downloads.
          upsert_env "TRANSLATOR_ALLOW_RUNTIME_MODEL_DOWNLOADS" "0"
          # CosyVoice3 model ID passed explicitly to every Batch job.
          upsert_env "TRANSLATOR_COSYVOICE_MODEL_ID" "FunAudioLLM/Fun-CosyVoice3-0.5B-2512"
          # Allow neural-voice fallback when clone fails (matches UI messaging).
          # LatentSync failures still mux dubbed audio into the original video and record a warning.
          upsert_env "TRANSLATOR_ALLOW_VOICE_CLONE_FALLBACK" "true"
          upsert_env "TRANSLATOR_ALLOW_LIP_SYNC_FALLBACK" "true"
          # Keep lip sync hidden/disabled for normal users until we add
          # per-user permissions. When enabled later, API routes these jobs to
          # the g5 fast queue via TRANSLATOR_BATCH_JOB_QUEUE_FAST.
          upsert_env "TRANSLATOR_LIP_SYNC_ENABLED" "false"
          upsert_env "TRANSLATOR_LIP_SYNC_ALLOWED_EMAILS" "guptanikhil2056@gmail.com"
          # CPU Fargate queue for Neural Voice (no GPU) jobs — edge-tts dubbing.
          # Starts in ~30 sec (Fargate), 10x cheaper than GPU.
          upsert_env "TRANSLATOR_CPU_BATCH_JOB_QUEUE"      "${{ env.CF_STACK_PREFIX }}-translator-cpu-queue"
          upsert_env "TRANSLATOR_CPU_BATCH_JOB_DEFINITION" "${{ needs.build-translator-cpu.outputs.batch_job_def }}"
          echo ".env.green ready ($(wc -l < /tmp/.env.green) lines)"

      # Run the existing deploy script. It handles CloudFormation, S3, and CloudFront.
      - name: Deploy (CloudFormation + S3 + Lambda)
        shell: pwsh
        run: |
          try {
            if ("${{ github.event_name }}" -eq "push") {
              $before = "${{ github.event.before }}"
              if ([string]::IsNullOrWhiteSpace($before) -or $before -eq "0000000000000000000000000000000000000000") {
                $before = "HEAD~1"
              }
              $changed = git diff --name-only $before "${{ github.sha }}"
              $requiresServerless = $changed | Select-String -Pattern '^(artifacts/api-server/|deploy/aws-serverless/|Dockerfile\.api-lambda|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml)'
              if (-not $requiresServerless) {
                Write-Host "No API/serverless inputs changed; deploying static frontend only."
                $stack = aws cloudformation describe-stacks `
                  --region "${{ env.AWS_REGION }}" `
                  --stack-name "${{ env.CF_STACK_PREFIX }}-serverless" | ConvertFrom-Json
                $outputs = @{}
                foreach ($output in $stack.Stacks[0].Outputs) {
                  $outputs[$output.OutputKey] = $output.OutputValue
                }
                $siteBucket = $outputs["StaticSiteBucketName"]
                $distributionId = $outputs["CloudFrontDistributionId"]
                if (-not $siteBucket -or -not $distributionId) {
                  throw "Failed to resolve frontend deploy outputs"
                }

                pnpm --filter @workspace/yt-downloader run build
                if ($LASTEXITCODE -ne 0) { throw "yt-downloader build failed" }

                aws s3 sync `
                  "artifacts/yt-downloader/dist/public" `
                  "s3://$siteBucket/" `
                  --region "${{ env.AWS_REGION }}" `
                  --delete `
                  --exclude "*.html" `
                  --cache-control "public, max-age=31536000, immutable"
                if ($LASTEXITCODE -ne 0) { throw "frontend asset sync failed" }

                aws s3 sync `
                  "artifacts/yt-downloader/dist/public" `
                  "s3://$siteBucket/" `
                  --region "${{ env.AWS_REGION }}" `
                  --delete `
                  --exclude "*" --include "*.html" `
                  --cache-control "no-cache, no-store, must-revalidate" `
                  --content-type "text/html; charset=utf-8"
                if ($LASTEXITCODE -ne 0) { throw "frontend html sync failed" }

                aws cloudfront create-invalidation `
                  --distribution-id $distributionId `
                  --paths "/*" | Out-Null
                if ($LASTEXITCODE -ne 0) { throw "cloudfront invalidation failed" }

                Write-Host "Frontend-only deploy complete."
                exit 0
              }
            }

            ./deploy/aws-serverless/deploy-serverless.ps1 `
              -Region "${{ env.AWS_REGION }}" `
              -Prefix "${{ env.CF_STACK_PREFIX }}" `
              -SkipImageBuild `
              -ImageUri "${{ needs.build-api.outputs.image_uri }}" `
              -SiteDomainName "${{ env.SITE_DOMAIN_NAME }}" `
              -CloudFrontCertificateArn "${{ env.CLOUDFRONT_CERTIFICATE_ARN }}" `
              -EnvFilePath "/tmp/.env.green"
          } catch {
            Write-Host "::error::DEPLOY_SCRIPT_ERROR $($_.Exception.Message)"
            if ($_.ScriptStackTrace) {
              Write-Host "::error::DEPLOY_SCRIPT_STACK $($_.ScriptStackTrace)"
            }
            throw
          }

      - name: Apply ECR lifecycle policy to all repos
        run: |
          POLICY_3='{"rules":[{"rulePriority":1,"description":"Keep last 3 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":3},"action":{"type":"expire"}}]}'
          # All repos keep last 3 images — translator image is large (~20GB) and
          # 10-tag retention was costing ~$14/month in ECR storage with no rollback benefit.
          # 3 tags = current + 2 rollback versions, which is sufficient.
          for REPO in ${{ env.ECR_API_REPO }} ${{ env.ECR_WORKER_REPO }} ${{ env.ECR_TRANSLATOR_REPO }} ${{ env.ECR_TRANSLATOR_CPU_REPO }} ${{ env.ECR_TRANSLATOR_BASE_REPO }} malika-editor; do
            aws ecr put-lifecycle-policy \
              --repository-name "$REPO" \
              --lifecycle-policy-text "$POLICY_3" \
              --region "${{ env.AWS_REGION }}" \
              2>/dev/null && echo "✅ Lifecycle policy (keep 3) applied to $REPO" || echo "⚠️ Could not apply lifecycle policy to $REPO (repo may not exist yet)"
          done
          aws ecr put-lifecycle-policy \
            --repository-name "${{ env.ECR_TRANSLATOR_REPO }}" \
            --lifecycle-policy-text "$POLICY_3" \
            --region "${{ env.AWS_REGION }}" \
            2>/dev/null && echo "✅ Lifecycle policy (keep 3) applied to ${{ env.ECR_TRANSLATOR_REPO }}" || echo "⚠️ Could not apply lifecycle policy to ${{ env.ECR_TRANSLATOR_REPO }}"

      - name: Summary
        run: |
          echo "## ✅ Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **API image** | \`${{ needs.build-api.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Worker image** | \`${{ needs.build-worker.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          TRANSLATOR_JOB_DEF="${{ needs.build-translator.outputs.batch_job_def || needs.resolve-translator.outputs.batch_job_def }}"
          echo "| **Worker Batch job** | \`${{ needs.build-worker.outputs.batch_job_def }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Translator Batch job** | \`${TRANSLATOR_JOB_DEF}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Live** | https://videomaking.in |" >> $GITHUB_STEP_SUMMARY

  # ─── Job 5: Refresh custom GPU AMI with pre-pulled translator image ───────────
  # Runs when the GPU translator image tag changes OR when manually triggered.
  # Pre-pulling the image into an AMI eliminates the ~10-20 min cold-start pull.
  # Skipped on normal code pushes (API/worker only changes) to save CI time.
  refresh-gpu-ami:
    name: Refresh GPU AMI (pre-pull translator image)
    runs-on: ubuntu-latest
    needs: [build-translator, deploy]
    # AMI refresh runs whenever the GPU translator image is rebuilt. Even a
    # code-only slim image changes the top-level image digest/tag, so Batch
    # cold-starts must pull/verify that image unless the current tag is already
    # baked into the AMI. Skipping this caused 5+ minute STARTING delays after
    # slim-only deploys.
    #
    # Triggers:
    #   - build-translator success: current commit has a new GPU translator tag
    #   - rebuild_gpu_ami=true: manual workflow_dispatch override
    if: >
      always() &&
      needs.deploy.result == 'success' &&
      (
        needs.build-translator.result == 'success' ||
        github.event.inputs.rebuild_gpu_ami == 'true'
      )
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::596596146505:role/ytgrabber-green-gha-deployer
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve translator image URI
        id: image
        run: |
          # Use the newly built image if available; otherwise resolve the current active one
          if [ -n "${{ needs.build-translator.outputs.image_uri }}" ]; then
            IMAGE="${{ needs.build-translator.outputs.image_uri }}"
          else
            IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_TRANSLATOR_REPO }}:$(git rev-parse --short HEAD 2>/dev/null || echo latest)"
            # Fallback: find the most recently pushed tag
            IMAGE=$(aws ecr describe-images \
              --repository-name "${{ env.ECR_TRANSLATOR_REPO }}" \
              --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null | \
              xargs -I{} echo "${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_TRANSLATOR_REPO }}:{}" || \
              echo "SKIP")
          fi

          # ── Validate: reject obviously bad URIs ──────────────────────────
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "SKIP" ] || [[ "$IMAGE" == *":None" ]]; then
            echo "::error::Could not resolve a valid translator image URI. Got: '$IMAGE'"
            exit 1
          fi

          # ── Validate: confirm the tag actually exists in ECR ─────────────
          ECR_REPO="${{ env.ECR_TRANSLATOR_REPO }}"
          IMG_TAG="${IMAGE##*:}"
          DIGEST=$(aws ecr batch-get-image \
            --repository-name "$ECR_REPO" \
            --image-ids "imageTag=${IMG_TAG}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'images[0].imageId.imageDigest' \
            --output text 2>/dev/null || echo "")
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "::error::Image tag '${IMG_TAG}' not found in ECR repo '${ECR_REPO}'. Cannot build AMI."
            exit 1
          fi
          echo "ℹ️ ECR image verified — digest: ${DIGEST}"

          echo "image_uri=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ℹ️ Translator image for AMI: ${IMAGE}"

      - name: Find latest ECS-optimized GPU AMI
        id: base_ami
        run: |
          BASE=$(aws ec2 describe-images \
            --owners amazon \
            --filters \
              "Name=name,Values=amzn2-ami-ecs-gpu-hvm-*-x86_64-ebs" \
              "Name=state,Values=available" \
            --query "sort_by(Images, &CreationDate)[-1].ImageId" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "ami_id=${BASE}" >> "$GITHUB_OUTPUT"
          echo "ℹ️ Base ECS GPU AMI: ${BASE}"

      - name: Launch temp EC2 to pre-pull image
        id: launch
        run: |
          TRANSLATOR_IMAGE="${{ steps.image.outputs.image_uri }}"
          BASE_AMI="${{ steps.base_ami.outputs.ami_id }}"
          ACCOUNT="${{ env.AWS_ACCOUNT_ID }}"
          REGION="${{ env.AWS_REGION }}"

          # User-data: pull the translator image then signal done via a tag.
          # Script stored in .github/scripts/ami-userdata.sh with placeholder tokens
          # (ACCOUNT_PLACEHOLDER, REGION_PLACEHOLDER, TRANSLATOR_IMAGE_PLACEHOLDER).
          # CRITICAL: the script must be 100% ASCII.  Amazon Linux 2 cloud-init uses
          # Python 2 which crashes with UnicodeEncodeError on any non-ASCII byte in
          # user-data.  We validate the generated script before launching EC2.
          SCRIPT_FILE="/tmp/ami-userdata-generated.sh"
          sed \
            -e "s|ACCOUNT_PLACEHOLDER|${ACCOUNT}|g" \
            -e "s|REGION_PLACEHOLDER|${REGION}|g" \
            -e "s|TRANSLATOR_IMAGE_PLACEHOLDER|${TRANSLATOR_IMAGE}|g" \
            .github/scripts/ami-userdata.sh > "$SCRIPT_FILE"

          # ASCII guard: fail fast if any non-ASCII byte snuck into the script.
          # cloud-init Python 2 UnicodeEncodeError is silent and just stops user-data.
          if grep -qP '[^\x00-\x7F]' "$SCRIPT_FILE"; then
            echo "::error::ami-userdata contains non-ASCII characters - will break Amazon Linux 2 cloud-init!"
            grep -nP '[^\x00-\x7F]' "$SCRIPT_FILE"
            exit 1
          fi
          echo "ASCII check passed: ami-userdata is clean"
          chmod +x "$SCRIPT_FILE"

          # Use Spot instance to avoid the 4 vCPU On-Demand G-instance limit.
          SPOT_OPTIONS='{"MarketType":"spot"}'

          INSTANCE_ID=""
          # g4ad excluded — AMD GPU, no CUDA/NVIDIA runtime, warmup would silently fail.
          # g6 uses NVIDIA L4, g4dn uses NVIDIA T4, g5 uses NVIDIA A10G — all CUDA-capable.
          INSTANCE_TYPES="g4dn.xlarge g6.xlarge g5.xlarge g4dn.2xlarge g5.2xlarge g6.2xlarge"
          SUBNETS="subnet-0ffbf739e0c562b95 subnet-0fcc8baaf7eb3719f subnet-0e0a4fe35fcae2aa1 subnet-0930bd3f2ca841aae subnet-0c256313b9fe90d51 subnet-0e39d7f64d803f4d6"

          _try_launch() {
            local ITYPE="$1" SUBNET_ARG="$2" SUBNET_LABEL="$3"
            set +e
            INSTANCE_ID=$(aws ec2 run-instances \
              --image-id "${BASE_AMI}" \
              --instance-type "${ITYPE}" \
              --instance-market-options "${SPOT_OPTIONS}" \
              --iam-instance-profile "Name=${{ env.CF_STACK_PREFIX }}-ecs-instance-profile" \
              --block-device-mappings '[{"DeviceName":"/dev/xvda","Ebs":{"VolumeSize":200,"VolumeType":"gp3","DeleteOnTermination":true}}]' \
              $SUBNET_ARG \
              --associate-public-ip-address \
              --user-data "file://${SCRIPT_FILE}" \
              --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=ami-builder-translator},{Key=ami-build-status,Value=building}]" \
              --query "Instances[0].InstanceId" \
              --output text \
              --region ${{ env.AWS_REGION }} 2>/tmp/ami-builder-launch-error.log)
            RC=$?
            set -e
            if [ "$RC" -eq 0 ] && [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
              echo "Launched AMI builder with ${ITYPE} ${SUBNET_LABEL}: ${INSTANCE_ID}"
              return 0
            fi
            echo "Launch failed for ${ITYPE} ${SUBNET_LABEL}:"
            cat /tmp/ami-builder-launch-error.log || true
            INSTANCE_ID=""
            return 1
          }

          # Pass 1: try each type across all explicit subnets (AZ-specific).
          for INSTANCE_TYPE in $INSTANCE_TYPES; do
            for SUBNET_ID in $SUBNETS; do
              _try_launch "$INSTANCE_TYPE" "--subnet-id ${SUBNET_ID}" "in ${SUBNET_ID}" && break 2 || true
            done
          done

          # Pass 2: if all AZ-specific attempts failed, let AWS auto-select the AZ.
          # AWS itself recommends omitting the AZ when capacity is tight.
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "All AZ-specific attempts exhausted. Retrying without subnet (auto-AZ)..."
            for INSTANCE_TYPE in $INSTANCE_TYPES; do
              _try_launch "$INSTANCE_TYPE" "" "in auto-AZ" && break || true
            done
          fi

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Could not launch AMI builder in any configured subnet/instance type."
            exit 1
          fi

          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "Launched AMI builder: ${INSTANCE_ID}"

      - name: Wait for image pull to complete (max 60 min)
        run: |
          INSTANCE_ID="${{ steps.launch.outputs.instance_id }}"
          echo "Waiting for instance ${INSTANCE_ID} to finish pulling image..."
          READY="false"
          for i in $(seq 1 72); do
            sleep 50
            STATUS=$(aws ec2 describe-tags \
              --filters "Name=resource-id,Values=${INSTANCE_ID}" "Name=key,Values=ami-build-status" \
              --query "Tags[0].Value" --output text --region ${{ env.AWS_REGION }} 2>/dev/null || echo "unknown")
            echo "  [${i}/72] ami-build-status=${STATUS}"
            if [ "$STATUS" = "ready" ]; then
              echo "Image pull complete."
              READY="true"
              break
            fi
            if [ "$STATUS" = "failed" ]; then
              echo "::error::AMI builder user-data failed while pulling translator image."
              aws ec2 get-console-output --instance-id "${INSTANCE_ID}" --latest --region ${{ env.AWS_REGION }} --output text || true
              exit 1
            fi
          done
          if [ "$READY" != "true" ]; then
            echo "::error::Timed out waiting for translator image pre-pull. Refusing to create an unverified AMI."
            aws ec2 get-console-output --instance-id "${INSTANCE_ID}" --latest --region ${{ env.AWS_REGION }} --output text || true
            exit 1
          fi

      - name: Create AMI from instance
        id: create_ami
        run: |
          INSTANCE_ID="${{ steps.launch.outputs.instance_id }}"
          AMI_NAME="${{ env.CF_STACK_PREFIX }}-translator-ami-${GITHUB_SHA::8}"
          AMI_ID=$(aws ec2 create-image \
            --instance-id "${INSTANCE_ID}" \
            --name "${AMI_NAME}" \
            --description "Translator GPU AMI with pre-pulled image ${GITHUB_SHA::8}" \
            --no-reboot \
            --block-device-mappings '[{"DeviceName":"/dev/xvda","Ebs":{"VolumeSize":200,"VolumeType":"gp3"}}]' \
            --query "ImageId" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "ami_id=${AMI_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ AMI creation started: ${AMI_ID}"

      - name: Wait for AMI to be available
        run: |
          AMI_ID="${{ steps.create_ami.outputs.ami_id }}"
          REGION="${{ env.AWS_REGION }}"
          echo "Waiting for AMI ${AMI_ID} to become available..."

          # Use a custom poll loop instead of aws ec2 wait image-available.
          # The built-in waiter only retries ~40 times x 15s = ~10 min which is
          # not enough for a 200 GB snapshot of a 20 GB image.
          MAX_WAIT=7200
          INTERVAL=30
          ELAPSED=0

          while [ "$ELAPSED" -le "$MAX_WAIT" ]; do
            IMG_JSON=$(aws ec2 describe-images \
              --image-ids "$AMI_ID" \
              --region "$REGION" \
              --output json 2>/dev/null || echo '{}')

            STATE=$(echo "$IMG_JSON" | jq -r '.Images[0].State // "unknown"')
            REASON=$(echo "$IMG_JSON" | jq -r '.Images[0].StateReason.Message // ""')

            # Print snapshot progress so we can see it moving in the logs
            SNAPS=$(echo "$IMG_JSON" | jq -r '.Images[0].BlockDeviceMappings[].Ebs.SnapshotId? // empty' 2>/dev/null || true)
            for SNAP in $SNAPS; do
              PROG=$(aws ec2 describe-snapshots --snapshot-ids "$SNAP" --region "$REGION" \
                --query 'Snapshots[0].Progress' --output text 2>/dev/null || echo "?")
              echo "  [${ELAPSED}s] snapshot ${SNAP}: ${PROG}"
            done

            echo "[${ELAPSED}s/${MAX_WAIT}s] AMI state=${STATE} ${REASON}"

            if [ "$STATE" = "available" ]; then
              echo "AMI ready: ${AMI_ID}"
              exit 0
            fi
            if [ "$STATE" = "failed" ]; then
              echo "::error::AMI creation failed: ${REASON}"
              exit 1
            fi

            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::Timeout waiting for AMI ${AMI_ID} after ${MAX_WAIT}s"
          exit 1

      - name: Update Batch compute environments to use new AMI
        id: update_ce
        run: |
          AMI_ID="${{ steps.create_ami.outputs.ami_id }}"
          REGION="${{ env.AWS_REGION }}"

          # Discover real compute environments from the actual GPU job queues.
          # This avoids hardcoded CE names breaking when infra changes.
          QUEUES=(
            "${{ env.CF_STACK_PREFIX }}-gpu-queue"
            "${{ env.CF_STACK_PREFIX }}-gpu-fast-queue"
          )

          CES=""
          for Q in "${QUEUES[@]}"; do
            FOUND=$(aws batch describe-job-queues \
              --job-queues "$Q" \
              --region "$REGION" \
              --query 'jobQueues[0].computeEnvironmentOrder[].computeEnvironment' \
              --output text 2>/dev/null || true)
            CES="$CES $FOUND"
          done

          # Deduplicate and filter blanks
          CES=$(echo "$CES" | tr ' ' '\n' | grep -v '^$' | sort -u)

          if [ -z "$CES" ]; then
            echo "::error::No compute environments found from GPU job queues. Cannot apply new AMI."
            exit 1
          fi

          echo "Compute environments to update: $(echo $CES | tr '\n' ' ')"
          UPDATE_FAILED=0

          for CE in $CES; do
            echo "Updating ${CE} → AMI ${AMI_ID}"
            if ! aws batch update-compute-environment \
              --compute-environment "${CE}" \
              --compute-resources "{\"ec2Configuration\":[{\"imageIdOverride\":\"${AMI_ID}\",\"imageType\":\"ECS_AL2_NVIDIA\"}]}" \
              --region "${REGION}"; then
              echo "::error::Failed to update compute environment ${CE} with AMI ${AMI_ID}"
              UPDATE_FAILED=1
            else
              echo "✅ ${CE} → ${AMI_ID}"
            fi
          done

          if [ "$UPDATE_FAILED" = "1" ]; then
            exit 1
          fi
          echo "✅ All Batch compute environments updated to AMI ${AMI_ID}."
          echo "ces=$(echo $CES | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Terminate temp EC2 instance
        if: always()
        run: |
          aws ec2 terminate-instances \
            --instance-ids "${{ steps.launch.outputs.instance_id }}" \
            --region ${{ env.AWS_REGION }} 2>&1 || true
          echo "✅ Temp instance terminated."

      - name: Deregister old AMIs (keep last 3)
        run: |
          OLD_AMIS=$(aws ec2 describe-images \
            --owners self \
            --filters "Name=name,Values=${{ env.CF_STACK_PREFIX }}-translator-ami-*" \
                      "Name=state,Values=available" \
            --query "sort_by(Images, &CreationDate)[:-3].ImageId" \
            --output text --region ${{ env.AWS_REGION }})
          for AMI in $OLD_AMIS; do
            SNAP=$(aws ec2 describe-images --image-ids "$AMI" \
              --query "Images[0].BlockDeviceMappings[0].Ebs.SnapshotId" \
              --output text --region ${{ env.AWS_REGION }})
            aws ec2 deregister-image --image-id "$AMI" --region ${{ env.AWS_REGION }} 2>&1 || true
            aws ec2 delete-snapshot --snapshot-id "$SNAP" --region ${{ env.AWS_REGION }} 2>&1 || true
            echo "Cleaned old AMI: ${AMI}"
          done

      - name: AMI Summary
        run: |
          echo "## 🖥️ GPU AMI Refreshed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **New AMI** | \`${{ steps.create_ami.outputs.ami_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Translator image** | \`${{ steps.image.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Compute envs updated** | \`${{ steps.update_ce.outputs.ces }}\` |" >> $GITHUB_STEP_SUMMARY
