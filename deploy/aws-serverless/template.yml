  YtdlpCookiesS3Key:
    Type: String
    Default: ""
  YtdlpPoToken:
    Type: String
    NoEcho: true
    Default: ""
  YtdlpVisitorData:
    Type: String
    Default: ""
  YtdlpPotProviderUrl:
    Type: String
    Default: ""
  YtdlpProxy:
    Type: String
    Default: ""
  OutputBucketName:
    Type: String
  OutputBucketRegion:
    Type: String
    Default: us-east-1
  OutputObjectPrefix:
    Type: String
    Default: ytgrabber-green
  SignedUrlTtlSec:
    Type: Number
    Default: 7200
  YoutubeQueueRegion:
    Type: String
  YoutubeQueueJobTable:
    Type: String
  YoutubeBatchJobQueue:
    Type: String
  YoutubeBatchJobDefinition:
    Type: String
  VideoEditorBatchEnabled:
    Type: String
    Default: "false"
  VideoEditorBatchJobDefinition:
    Type: String
    Default: ""
  TranslatorBatchJobQueue:
    Type: String
    Default: "ytgrabber-green-gpu-queue"
  TranslatorBatchJobQueueFast:
    Type: String
    Default: ""
  TranslatorBatchJobDefinition:
    Type: String
    Default: "ytgrabber-green-translator-job"
  TranslatorCpuBatchJobQueue:
    Type: String
    Default: ""
  TranslatorCpuBatchJobDefinition:
    Type: String
    Default: ""
  TranslatorBatchTimeoutSeconds:
    Type: Number
    Default: 3000
  TranslatorBatchFallbackTimeoutSeconds:
    Type: Number
    Default: 3000
  TranslatorMaxVideoSizeBytes:
    Type: Number
    Default: 2147483648
  TranslatorAllowRuntimeModelDownloads:
    Type: String
    Default: "1"
  TranslatorCosyVoiceModelId:
    Type: String
    Default: "FunAudioLLM/Fun-CosyVoice3-0.5B-2512"
  TranslatorAllowVoiceCloneFallback:
    Type: String
    Default: "false"
  TranslatorAllowLipSyncFallback:
    Type: String
    Default: "true"
  TranslatorLipSyncEnabled:
    Type: String
    Default: "false"
  YoutubeQueuePrimaryEnabled:
    Type: String
    Default: "true"
  YoutubeQueueShadowEnabled:
    Type: String
    Default: "false"
  YoutubeQueuePrimaryJobTypes:
    Type: String
    Default: clip-cut,bhagwat-analyze,bhagwat-render,subtitles
  YoutubeQueueShadowJobTypes:
    Type: String
    Default: download,clip-cut
  LambdaClipMaxDurationSeconds:
    Type: Number
    Default: 600
  LambdaClipCommandTimeoutMs:
    Type: Number
    Default: 840000
  LambdaClipStallTimeoutMs:
    Type: Number
    Default: 60000
  LambdaClipHandoffSampleMs:
    Type: Number
    Default: 75000
  LambdaClipHandoffNoProgressMs:
    Type: Number
    Default: 120000
  LambdaClipSafeBudgetMs:
    Type: Number
    Default: 660000
  LambdaClipCompletionReserveMs:
    Type: Number
    Default: 120000
  YtdlpDownloadStallTimeoutMs:
    Type: Number
    Default: 60000
  YtdlpMaxDownloadAttempts:
    Type: Number
    Default: 4
  MaxConcurrentClipJobs:
    Type: Number
    Default: 3
  SubtitlesForceLambda:
    Type: String
    Default: "false"
  SubtitlesLambdaMaxDurationSeconds:
    Type: Number
    Default: 780
  VideoEditorBatchEnabled:
    Type: String
    Default: "true"
    Description: "Allow AWS Batch/Fargate for long AI Video Studio renders (and as worker-Lambda fallback)."
  VideoEditorFargateThresholdSec:
    Type: Number
    Default: 600
    Description: "Renders whose expected output exceeds this go to Batch instead of the fast worker Lambda."
  NotebookLmEnabled:
    Type: String
    Default: "false"
  NotebookLmNotebookId:
    Type: String
    Default: ""
  NotebookLmAuthJson:
    Type: String
    NoEcho: true
    Default: ""
  NotebookLmAuthS3Key:
    Type: String
    Default: ""
  NotebookLmTimeoutMs:
    Type: Number
    Default: 480000
  NotebookLmTurnDelayMs:
    Type: Number
    Default: 2500
  NotebookLmLocalQueueLimit:
    Type: Number
    Default: 12
  RateLimitBypassIps:
    Type: String
    Default: ""
  VapidPublicKey:
    Type: String
    Default: ""
  VapidPrivateKey:
    Type: String
    NoEcho: true
    Default: ""
  VapidSubject:
    Type: String
    Default: mailto:ops@videomaking.in

Conditions:
  UseAccessTable: !Not [!Equals [!Ref AccessTable, ""]]
  UseApiKeysTable: !Not [!Equals [!Ref ApiKeysTable, ""]]
  UseCustomSiteBucket: !Not [!Equals [!Ref SiteBucketName, ""]]
  UseCustomDomain: !And
    - !Not [!Equals [!Ref SiteDomainName, ""]]
    - !Not [!Equals [!Ref CloudFrontCertificateArn, ""]]
  SiteDomainIsWww: !Equals
    - !Select [0, !Split [".", !Ref SiteDomainName]]
    - "www"

Resources:
  CooldownsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Prefix}-cooldowns"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [UseCustomSiteBucket, !Ref SiteBucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-site-versions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 7

  CloudFrontOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Description: !Sub "${Prefix} static site OAC"
        Name: !Sub "${Prefix}-site-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontSpaRewriteFn:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${Prefix}-spa-rewrite"
      AutoPublish: true
      FunctionConfig:
        Runtime: cloudfront-js-2.0
        Comment: Rewrite clean non-API routes to index.html for SPA
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri || "/";
          if (uri.startsWith("/api/")) return request;
          if (uri === "/api") return request;
          if (uri.indexOf(".") !== -1) return request;
          request.uri = "/index.html";
          return request;
        }

  StaticSecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${Prefix}-static-security-headers"
        Comment: Security headers for the SPA document and static assets
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            ContentSecurityPolicy: "base-uri 'self'; frame-ancestors 'none'; object-src 'none'"
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: no-referrer
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: false
            Preload: false
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: Permissions-Policy
              Value: "camera=(), microphone=(), geolocation=()"
              Override: true

  ApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-api-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - tasks.apprunner.amazonaws.com
                - lambda.amazonaws.com
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${Prefix}-api-access"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${YoutubeQueueRegion}:${AWS::AccountId}:table/${YoutubeQueueJobTable}"
                  - !If
                    - UseAccessTable
                    - !Sub "arn:aws:dynamodb:${YoutubeQueueRegion}:${AWS::AccountId}:table/${AccessTable}"
                    - !Ref AWS::NoValue
                  - !If
                    - UseApiKeysTable
                    - !Sub "arn:aws:dynamodb:${YoutubeQueueRegion}:${AWS::AccountId}:table/${ApiKeysTable}"
                    - !Ref AWS::NoValue
                  - !GetAtt CooldownsTable.Arn
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                  - batch:TerminateJob
                  - batch:DescribeJobs
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${OutputBucketName}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${OutputBucketName}"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt StaticSiteBucket.Arn
                  - !Sub "${StaticSiteBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource:
                  - !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${Prefix}-translator"
        - PolicyName: !Sub "${Prefix}-self-invoke"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Prefix}-api"
        - PolicyName: !Sub "${Prefix}-access-allowlist"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource:
                  - !If
                    - UseAccessTable
                    - !Sub "arn:aws:dynamodb:${YoutubeQueueRegion}:${AWS::AccountId}:table/${AccessTable}"
                    - !Ref AWS::NoValue

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Prefix}-api"
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt ApiRole.Arn
      MemorySize: 1536
      Timeout: 900
      EphemeralStorage:
        Size: 5120
      Environment:
        Variables:
          NODE_ENV: production
          PORT: "8080"
          SESSION_SECRET: !Ref SessionSecret
          WEBSITE_AUTH_USER: !Ref WebsiteAuthUser
          WEBSITE_AUTH_PASSWORD: !Ref WebsiteAuthPassword
          GOOGLE_AUTH_ENABLED: !Ref GoogleAuthEnabled
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          APPROVED_USER_EMAILS: !Ref ApprovedUserEmails
          APPROVED_ADMIN_EMAILS: !Ref ApprovedAdminEmails
          ACCESS_TABLE: !Ref AccessTable
          API_KEYS_TABLE: !Ref ApiKeysTable
          API_ACCESS_EMAILS: !Ref ApiAccessEmails
          API_KEY_RATE_LIMIT_PER_MIN: !Ref ApiKeyRateLimitPerMin
          WEBHOOK_SIGNING_SECRET: !Ref WebhookSigningSecret
          ADMIN_PANEL_ENABLED: !Ref AdminPanelEnabled
          TRUST_PROXY_HOPS: "1"
          LOGIN_MAX_FAILURES: "5"
          LOGIN_RATE_WINDOW_MS: "900000"
          LOGIN_BLOCK_MS: "900000"
          TRANSLATOR_ENABLED: !Ref TranslatorEnabled
          SUPER_AGENT_ENABLED: !Ref SuperAgentEnabled
          PITAJI_FEATURE_ENABLED: !Ref PitajiFeatureEnabled
          BHAGWAT_PASSWORD: !Ref BhagwatPassword
          GEMINI_API_KEYS: !Join
            - ","
            - - !Ref GeminiApiKey
              - !Ref GeminiApiKey2
              - !Ref GeminiApiKey3
              - !Ref GeminiApiKey4
              - !Ref GeminiApiKey5
              - !Ref GeminiApiKey6
              - !Ref GeminiApiKey7
              - !Ref GeminiApiKey8
              - !Ref GeminiApiKey9
              - !Ref GeminiApiKey10
              - !Ref GeminiApiKey11
              - !Ref GeminiApiKey12
              - !Ref GeminiApiKey13
          HEYGEN_API_KEY: !Ref HeyGenApiKey
          HEYGEN_UPLOAD_MAX_BYTES: !Ref HeyGenUploadMaxBytes
          HEYGEN_SRT_MODEL: !Ref HeyGenSrtModel
          HEYGEN_REQUEST_TIMEOUT_MS: !Ref HeyGenRequestTimeoutMs
          GOOGLE_GENAI_USE_VERTEXAI: !Ref GoogleGenaiUseVertexai
          GOOGLE_CLOUD_PROJECT: !Ref GoogleCloudProject
          GOOGLE_CLOUD_LOCATION: !Ref GoogleCloudLocation
          OLLAMA_API_KEYS: !Join
            - ","
            - - !Ref OllamaApiKey
              - !Ref OllamaApiKey2
              - !Ref OllamaApiKey3
              - !Ref OllamaApiKey4
          GROQ_API_KEYS: !Join
            - ","
            - - !Ref GroqApiKey
              - !Ref GroqApiKey2
              - !Ref GroqApiKey3
              - !Ref GroqApiKey4
          NVIDIA_API_KEYS: !Join
            - ","
            - - !Ref NvidiaApiKey
              - !Ref NvidiaApiKey2
              - !Ref NvidiaApiKey3
              - !Ref NvidiaApiKey4
          COPILOT_ULTRA_MODEL: !Ref CopilotUltraModel
          COPILOT_FAST_MODEL: !Ref CopilotFastModel
          COPILOT_ULTRA_MAX_OUTPUT_TOKENS: !Ref CopilotUltraMaxOutputTokens
          COPILOT_FAST_MAX_OUTPUT_TOKENS: !Ref CopilotFastMaxOutputTokens
          COPILOT_GEMINI_HELPER_MODEL: !Ref CopilotGeminiHelperModel
          ASSEMBLYAI_API_KEY: !Ref AssemblyAiApiKey
          E2B_API_KEY: !Ref E2BApiKey
          YTDLP_COOKIES_FILE: !Ref YtdlpCookiesFile
          YTDLP_COOKIES_S3_KEY: !Ref YtdlpCookiesS3Key
          S3_BUCKET: !Ref OutputBucketName
          S3_BUCKET_NAME: !Ref OutputBucketName
          S3_REGION: !Ref OutputBucketRegion
          UPLOADS_TABLE: !Ref YoutubeQueueJobTable
          UPLOADS_TABLE_KEY: jobId
          S3_OBJECT_PREFIX: !Ref OutputObjectPrefix
          S3_SIGNED_URL_TTL_SEC: !Ref SignedUrlTtlSec
          YOUTUBE_QUEUE_PRIMARY_ENABLED: !Ref YoutubeQueuePrimaryEnabled
          YOUTUBE_QUEUE_PRIMARY_JOB_TYPES: !Ref YoutubeQueuePrimaryJobTypes
          LAMBDA_CLIP_MAX_DURATION_SECONDS: !Ref LambdaClipMaxDurationSeconds
          LAMBDA_CLIP_COMMAND_TIMEOUT_MS: !Ref LambdaClipCommandTimeoutMs
          LAMBDA_CLIP_STALL_TIMEOUT_MS: !Ref LambdaClipStallTimeoutMs
          LAMBDA_CLIP_HANDOFF_SAMPLE_MS: !Ref LambdaClipHandoffSampleMs
          LAMBDA_CLIP_HANDOFF_NO_PROGRESS_MS: !Ref LambdaClipHandoffNoProgressMs
          LAMBDA_CLIP_SAFE_BUDGET_MS: !Ref LambdaClipSafeBudgetMs
          LAMBDA_CLIP_COMPLETION_RESERVE_MS: !Ref LambdaClipCompletionReserveMs
          YTDLP_DOWNLOAD_STALL_TIMEOUT_MS: !Ref YtdlpDownloadStallTimeoutMs
          YTDLP_MAX_DOWNLOAD_ATTEMPTS: !Ref YtdlpMaxDownloadAttempts
          MAX_CONCURRENT_CLIP_JOBS: !Ref MaxConcurrentClipJobs
          SUBTITLES_FORCE_LAMBDA: !Ref SubtitlesForceLambda
          SUBTITLES_LAMBDA_MAX_DURATION_SECONDS: !Ref SubtitlesLambdaMaxDurationSeconds
          VIDEO_EDITOR_BATCH_ENABLED: !Ref VideoEditorBatchEnabled
          VIDEO_EDITOR_FARGATE_THRESHOLD_SEC: !Ref VideoEditorFargateThresholdSec
          YOUTUBE_QUEUE_REGION: !Ref YoutubeQueueRegion
          YOUTUBE_QUEUE_JOB_TABLE: !Ref YoutubeQueueJobTable
          COOLDOWNS_TABLE: !Ref CooldownsTable
          YOUTUBE_BATCH_JOB_QUEUE: !Ref YoutubeBatchJobQueue
          YOUTUBE_BATCH_JOB_DEFINITION: !Ref YoutubeBatchJobDefinition
          TRANSLATOR_LIP_SYNC_ENABLED: !Ref TranslatorLipSyncEnabled
          RATE_LIMIT_BYPASS_IPS: !Ref RateLimitBypassIps
          DISABLE_STATIC_SERVE: "true"

  # ── Lambda Function URL with response streaming ──────────────────────────
  # Replaces the previous API Gateway HTTP API. Function URLs invoked with
  # InvokeMode=RESPONSE_STREAM forward chunked responses straight to the
  # caller (no 30s gateway timeout, no full-response buffering) — which is
  # what makes SSE deliver token-by-token like Replit.
  ApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt ApiFunction.Arn
      AuthType: NONE
      InvokeMode: RESPONSE_STREAM

  ApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref ApiFunction
      Principal: "*"
      FunctionUrlAuthType: NONE

  ApiFunctionUrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      Principal: "*"
      InvokedViaFunctionUrl: true

  StaticBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${StaticSiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        DefaultRootObject: index.html
        CustomErrorResponses: []
        Aliases: !If
          - UseCustomDomain
          - !If
            - SiteDomainIsWww
            - [!Ref SiteDomainName, !Select [1, !Split ["www.", !Ref SiteDomainName]]]
            - [!Ref SiteDomainName, !Sub "www.${SiteDomainName}"]
          - !Ref AWS::NoValue
        Origins:
          - Id: static-origin
            DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt CloudFrontOac.Id
          - Id: api-origin
            DomainName: !Select [2, !Split ["/", !GetAtt ApiFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
              OriginSSLProtocols:
                - TLSv1.2
              # Long enough for the SSE heartbeats (every 8s in agent.ts) to
              # keep the upstream connection alive while a long agent run
              # streams. The default is 30s; bumping to 60 keeps us safely
              # under CloudFront's hard 60s read timeout limit.
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 5
        DefaultCacheBehavior:
          TargetOriginId: static-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          ResponseHeadersPolicyId: !Ref StaticSecurityHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt CloudFrontSpaRewriteFn.FunctionMetadata.FunctionARN
        CacheBehaviors:
          - PathPattern: /api*
            TargetOriginId: api-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad   # Managed-CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # Managed-AllViewer
            # CRITICAL: Compress MUST be false on streaming paths.
            # CloudFront's gzip pipeline buffers the entire response before
            # sending — that re-introduces the very latency we're fixing by
            # moving off API Gateway. Lambda Function URL streaming + this
            # flag = true millisecond-level chunked SSE delivery.
            Compress: false
        ViewerCertificate: !If
          - UseCustomDomain
          - AcmCertificateArn: !Ref CloudFrontCertificateArn
            MinimumProtocolVersion: TLSv1.2_2021
            SslSupportMethod: sni-only
          - CloudFrontDefaultCertificate: true

Outputs:
  StaticSiteBucketName:
    Value: !Ref StaticSiteBucket
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
  ApiFunctionUrl:
    Description: Lambda Function URL (response-stream mode) sitting behind CloudFront
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  ApiFunctionName:
    Value: !Ref ApiFunction
