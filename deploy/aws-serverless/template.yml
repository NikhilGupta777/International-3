AWSTemplateFormatVersion: "2010-09-09"
Description: VideoMaking Studio serverless control plane and static frontend

Parameters:
  Prefix:
    Type: String
  ImageUri:
    Type: String
  SiteBucketName:
    Type: String
    Default: ""
  SiteDomainName:
    Type: String
    Default: ""
  CloudFrontCertificateArn:
    Type: String
    Default: ""
  SessionSecret:
    Type: String
    NoEcho: true
  WebsiteAuthUser:
    Type: String
    Default: kalki_avatar
  WebsiteAuthPassword:
    Type: String
    NoEcho: true
  GoogleAuthEnabled:
    Type: String
    Default: "false"
  GoogleClientId:
    Type: String
    Default: ""
  ApprovedUserEmails:
    Type: String
    Default: ""
  ApprovedAdminEmails:
    Type: String
    Default: ""
  AccessTable:
    Type: String
    Default: ""
  ApiKeysTable:
    Type: String
    Default: ""
    Description: "Optional dedicated DynamoDB table for API keys/webhooks. Leave empty to reuse AccessTable."
  ApiAccessEmails:
    Type: String
    Default: ""
    Description: "Comma-separated emails granted Developer/API-key access (admins always qualify)."
  ApiKeyRateLimitPerMin:
    Type: String
    Default: "120"
    Description: "Default per-API-key request rate limit (requests/minute)."
  WebhookSigningSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: "HMAC secret for signing webhook callbacks. Falls back to SessionSecret when empty."
  AdminPanelEnabled:
    Type: String
    Default: "false"
  TranslatorEnabled:
    Type: String
    Default: "true"
  SuperAgentEnabled:
    Type: String
    Default: "true"
  PitajiFeatureEnabled:
    Type: String
    Default: "false"
  PitajiUsername:
    Type: String
    Default: "pitaji"
  PitajiPassword:
    Type: String
    NoEcho: true
    Default: ""
  BhagwatPassword:
    Type: String
    NoEcho: true
  GeminiApiKey:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey2:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey3:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey4:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey5:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey6:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey7:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey8:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey9:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey10:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey11:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey12:
    Type: String
    NoEcho: true
    Default: ""
  GeminiApiKey13:
    Type: String
    NoEcho: true
    Default: ""
  HeyGenApiKey:
    Type: String
    NoEcho: true
    Default: ""
  HeyGenUploadMaxBytes:
    Type: Number
    Default: 5242880
  HeyGenSrtModel:
    Type: String
    Default: gemini-3.5-flash
  HeyGenRequestTimeoutMs:
    Type: Number
    Default: 60000
  GoogleGenaiUseVertexai:
    Type: String
    Default: "false"
  GoogleCloudProject:
    Type: String
    Default: ""
  GoogleCloudLocation:
    Type: String
    Default: "global"
  OllamaApiKey:
    Type: String
    NoEcho: true
    Default: ""
  OllamaApiKey2:
    Type: String
    NoEcho: true
    Default: ""
  OllamaApiKey3:
    Type: String
    NoEcho: true
    Default: ""
  OllamaApiKey4:
    Type: String
    NoEcho: true
    Default: ""
  GroqApiKey:
    Type: String
    NoEcho: true
    Default: ""
  GroqApiKey2:
    Type: String
    NoEcho: true
    Default: ""
  GroqApiKey3:
    Type: String
    NoEcho: true
    Default: ""
  GroqApiKey4:
    Type: String
    NoEcho: true
    Default: ""
  NvidiaApiKey:
    Type: String
    NoEcho: true
    Default: ""
  NvidiaApiKey2:
    Type: String
    NoEcho: true
    Default: ""
  NvidiaApiKey3:
    Type: String
    NoEcho: true
    Default: ""
  NvidiaApiKey4:
    Type: String
    NoEcho: true
    Default: ""
  CopilotUltraModel:
    Type: String
