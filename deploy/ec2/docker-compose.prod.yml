services:
  app:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
    expose:
      - "8080"
    ports: []
    depends_on:
      db:
        condition: service_healthy
      bgutil-provider:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bgutil-provider:
    restart: unless-stopped

  db:
    restart: unless-stopped

  proxy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_EMAIL: ${APP_EMAIL}
    volumes:
      - ./deploy/ec2/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
